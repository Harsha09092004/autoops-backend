services:
  - type: web
    name: autoops-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --workers 1 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000
    envVars:
      - key: SUPABASE_URL
        scope: build,runtime
        value: ${SUPABASE_URL}
      - key: SUPABASE_KEY
        scope: build,runtime
        value: ${SUPABASE_KEY}
      - key: RESEND_API_KEY
        scope: build,runtime
        value: ${RESEND_API_KEY}
      - key: HOST
        scope: build,runtime
        value: 0.0.0.0
      - key: PORT
        scope: build,runtime
        value: 8000
      - key: DEBUG
        scope: build,runtime
        value: "False"
